<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yappwire</title>
  <style>
    body {
      background-color: #0c0c14;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 100vh;
      align-items: center;
      box-sizing: border-box;
    }

    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      width: 100%;
      max-width: 440px;
      box-sizing: border-box;
    }

    .card {
      background: #131322;
      border: 1px solid #1e1e38;
      border-radius: 24px;
      padding: 40px 24px;
      width: 100%;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      box-sizing: border-box;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 800;
      margin: 0 0 15px 0;
      color: #dbeafe;
      letter-spacing: -0.5px;
    }

    p {
      color: #94a3b8;
      font-size: 1rem;
      line-height: 1.6;
      margin: 0 0 30px 0;
    }

    .countdown-box {
      background: rgba(255, 255, 255, 0.03);
      border: 1px dashed rgba(165, 180, 252, 0.2);
      border-radius: 16px;
      padding: 30px 20px;
      width: 100%;
      box-sizing: border-box;
    }

    .countdown-label {
      color: #a5b4fc;
      margin: 0 0 15px 0;
      font-size: 0.9rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 600;
    }

    #countdown {
      color: #ffffff;
      font-size: 1.8rem;
      font-weight: bold;
      font-family: monospace;
      letter-spacing: 1px;
    }

    footer {
      padding: 30px 20px;
      color: #475569;
      font-size: 0.85rem;
      text-align: center;
      width: 100%;
      box-sizing: border-box;
    }

    footer span {
      color: #64748b;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="card">
      <h1>Yappwire</h1>
      <p>Welcome to the official home of Yappwire. Connect, chat, and explore seamlessly.</p>

      <div class="countdown-box">
        <div class="countdown-label">Launching In</div>
        <div id="countdown">00d : 00h : 00m : 00s</div>
      </div>
    </div>
  </div>

  <footer>
    Powered by <span>Gemini & Claude</span> | <span>Supabase</span> | <span>Google</span>
  </footer>

  <script>
    // Target Launch Date: Sunday, July 5, 2026 at 8:00 PM
    const launchDate = new Date(2026, 6, 5, 20, 0, 0).getTime();

    const timer = setInterval(function() {
      const now = new Date().getTime();
      const distance = launchDate - now;

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / (1000));

      const d = days.toString().padStart(2, '0');
      const h = hours.toString().padStart(2, '0');
      const m = minutes.toString().padStart(2, '0');
      const s = seconds.toString().padStart(2, '0');

      if (distance < 0) {
        clearInterval(timer);
        document.getElementById("countdown").innerHTML = "AVAILABLE NOW!";
      } else {
        document.getElementById("countdown").innerHTML = `${d}d : ${h}h : ${m}m : ${s}s`;
      }
    }, 1000);
  </script>

</body>
</html>
