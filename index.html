<div style="display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; max-width: 400px; margin: 0 auto;">

  <div style="background: rgba(255, 255, 255, 0.05); border: 1px dashed rgba(255, 255, 255, 0.2); border-radius: 16px; padding: 30px; width: 100%; text-align: center; box-sizing: border-box;">
    <h3 style="color: #a5b4fc; margin: 0 0 15px 0; font-size: 1.1rem; letter-spacing: 1px; text-transform: uppercase;">Launching In</h3>
    
    <div id="countdown" style="color: #ffffff; font-size: 2rem; font-weight: bold; font-family: monospace; letter-spacing: 2px;">
      00:00:00:00
    </div>
  </div>

</div>

<script>
  // Set the launch date (Year, Month [0-11], Day, Hour, Minute)
  // July is month index 6 (January is 0)
  const launchDate = new Date(2026, 6, 5, 20, 0, 0).getTime();

  const timer = setInterval(function() {
    const now = new Date().getTime();
    const distance = launchDate - now;

    // Time calculations for days, hours, minutes and seconds
    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / (1000));

    // Format numbers to always have two digits
    const d = days.toString().padStart(2, '0');
    const h = hours.toString().padStart(2, '0');
    const m = minutes.toString().padStart(2, '0');
    const s = seconds.toString().padStart(2, '0');

    // Display the result
    if (distance < 0) {
      clearInterval(timer);
      document.getElementById("countdown").innerHTML = "AVAILABLE NOW!";
    } else {
      document.getElementById("countdown").innerHTML = `${d}d : ${h}h : ${m}m : ${s}s`;
    }
  }, 1000);
</script>
