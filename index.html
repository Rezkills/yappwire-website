<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Yappwire — Launching Soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000000;
    --surface: #0c0c10;
    --card: #131317;
    --blue: #007AFF;
    --gold: #FFD60A;
    --hot: #FF2D55;
    --text: #FFFFFF;
    --sub: #8E8E93;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    overflow-x: hidden;
    min-height: 100vh;
  }
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(70px);
    opacity: 0.35;
    z-index: 0;
    pointer-events: none;
  }
  .orb1 { width: 340px; height: 340px; background: var(--blue); top: -100px; left: -80px; animation: drift1 14s ease-in-out infinite; }
  .orb2 { width: 260px; height: 260px; background: var(--gold); bottom: -60px; right: -60px; opacity: 0.18; animation: drift2 18s ease-in-out infinite; }
  @keyframes drift1 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(40px, 60px); } }
  @keyframes drift2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-30px, -40px); } }

  .wrap {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 32px 20px 60px;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(0,122,255,0.12);
    border: 1px solid rgba(0,122,255,0.35);
    color: var(--blue);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 8px 18px;
    border-radius: 999px;
    margin-bottom: 22px;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--blue); animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  .logo {
    font-family: 'Baloo 2', sans-serif;
    font-weight: 800;
    font-size: clamp(42px, 10vw, 76px);
    line-height: 1;
    margin: 0 0 10px;
    background: linear-gradient(180deg, #FFFFFF 0%, #C9C9CE 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .tagline {
    color: var(--sub);
    font-size: clamp(15px, 3vw, 18px);
    margin: 0 0 46px;
    font-weight: 500;
  }

  #countdown-stage { display: contents; }

  .countdown-row {
    display: flex;
    gap: clamp(10px, 3vw, 20px);
  }
  .unit {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: clamp(14px, 3vw, 24px) clamp(10px, 3vw, 22px);
    min-width: clamp(64px, 18vw, 96px);
    box-shadow: 0 0 0 1px rgba(0,122,255,0.06), 0 12px 30px rgba(0,122,255,0.08);
  }
  .unit .num {
    font-family: 'Inter', sans-serif;
    font-variant-numeric: tabular-nums;
    font-weight: 800;
    font-size: clamp(28px, 8vw, 52px);
    line-height: 1;
    display: block;
  }
  .unit .label {
    display: block;
    margin-top: 8px;
    font-size: clamp(10px, 2.4vw, 12px);
    color: var(--sub);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .unit.urgent .num { color: var(--hot); }
  .unit.urgent { animation: shake-urgent 0.6s ease-in-out infinite; border-color: rgba(255,45,85,0.4); }
  @keyframes shake-urgent {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-2px); }
  }

  .sound-toggle {
    margin-top: 34px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--sub);
    font-size: 13px;
    font-weight: 600;
    padding: 9px 18px;
    border-radius: 999px;
    cursor: pointer;
  }
  .sound-toggle.on { color: var(--gold); border-color: rgba(255,214,10,0.4); }

  /* --- Launch moment --- */
  .launch-headline {
    font-family: 'Baloo 2', sans-serif;
    font-weight: 800;
    font-size: clamp(38px, 9vw, 68px);
    background: linear-gradient(135deg, var(--gold), var(--blue));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin: 0 0 14px;
    opacity: 0;
    transform: scale(0.85);
  }
  .launch-sub {
    color: var(--sub);
    font-size: 16px;
    margin: 0 0 32px;
    opacity: 0;
  }
  .download-btn {
    display: none;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, var(--blue), #34C9FF);
    color: #fff;
    font-weight: 700;
    font-size: 17px;
    padding: 17px 34px;
    border-radius: 999px;
    text-decoration: none;
    box-shadow: 0 16px 40px rgba(0,122,255,0.35);
    opacity: 0;
    transform: translateY(14px) scale(0.9);
  }
  .download-btn svg { width: 20px; height: 20px; }
  .download-note {
    margin-top: 16px;
    color: var(--sub);
    font-size: 12px;
    opacity: 0;
  }

  @media (prefers-reduced-motion: reduce) {
    .orb, .unit.urgent { animation: none; }
  }

  .site-footer {
    position: fixed;
    bottom: 14px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 11px;
    color: #4b5563;
    letter-spacing: 0.05em;
    z-index: 1;
  }
  .site-footer a {
    color: #6b7280;
    text-decoration: none;
    font-weight: 600;
  }
  .site-footer a:hover { color: #8E8E93; }

  .flash-overlay {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(0,122,255,0.4) 40%, rgba(0,0,0,0) 70%);
    pointer-events: none;
    opacity: 0;
    z-index: 8;
  }
  .shockwave {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 3px solid rgba(0,122,255,0.7);
    transform: translate(-50%, -50%) scale(1);
    opacity: 0;
    pointer-events: none;
    z-index: 6;
  }
  .eyebrow.fading { transition: opacity 0.4s ease, transform 0.4s ease; opacity: 0; transform: translateY(-10px) scale(0.9); }
</style>
</head>
<body>

<canvas id="burst-canvas" style="position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:5;"></canvas>
<div class="flash-overlay" id="flash-overlay"></div>
<div class="shockwave" id="shockwave"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="wrap">
  <div class="eyebrow" id="eyebrow"><span class="dot"></span> Launching Soon</div>
  <h1 class="logo">Yappwire</h1>
  <p class="tagline" id="tagline">The wait is almost over.</p>

  <div id="pre-launch">
    <div class="countdown-row">
      <div class="unit" id="unit-days"><span class="num" id="num-days">00</span><span class="label">Days</span></div>
      <div class="unit" id="unit-hours"><span class="num" id="num-hours">00</span><span class="label">Hours</span></div>
      <div class="unit" id="unit-mins"><span class="num" id="num-mins">00</span><span class="label">Minutes</span></div>
      <div class="unit" id="unit-secs"><span class="num" id="num-secs">00</span><span class="label">Seconds</span></div>
    </div>
    <button class="sound-toggle" id="sound-btn" onclick="toggleSound()">🔕 Sound off</button>
  </div>

  <div id="post-launch" style="display:none;">
    <h2 class="launch-headline" id="launch-headline">Yappwire is live!</h2>
    <p class="launch-sub" id="launch-sub">Thanks for waiting. Let's talk.</p>
    <a class="download-btn" id="download-btn" href="./yappwire.apk" download>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v13m0 0l-5-5m5 5l5-5M4 21h16"/></svg>
      Download for Android
    </a>
    <p class="download-note">Free forever. No account needed to install.</p>
  </div>
</div>

<script>
  // ---- SET YOUR LAUNCH MOMENT HERE ----
  // This uses the VISITOR'S OWN DEVICE clock/timezone. If you want everyone
  // worldwide to see the exact same real-world moment regardless of their
  // timezone, tell Claude and this can be pinned to a fixed UTC time instead.
  const LAUNCH_DATE = new Date(2026, 7, 5, 23, 59, 59); // Aug 5, 2026, 11:59:59 PM (local time)

  let soundOn = false;
  let launched = false;
  let audioCtx = null;

  function toggleSound() {
    soundOn = !soundOn;
    const btn = document.getElementById('sound-btn');
    btn.textContent = soundOn ? '🔔 Sound on' : '🔕 Sound off';
    btn.classList.toggle('on', soundOn);
    if (soundOn && !audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
  }

  function tone(freq, start, duration, type, gainPeak) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, audioCtx.currentTime + start);
    gain.gain.linearRampToValueAtTime(gainPeak || 0.15, audioCtx.currentTime + start + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + start + duration);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(audioCtx.currentTime + start);
    osc.stop(audioCtx.currentTime + start + duration + 0.05);
  }

  function playTick() {
    if (!soundOn || !audioCtx) return;
    tone(880, 0, 0.06, 'sine', 0.05);
  }

  function playLaunchChime() {
    if (!soundOn || !audioCtx) return;
    tone(80, 0, 0.9, 'sine', 0.3); // deep impact hit
    tone(160, 0, 0.7, 'sine', 0.15);
    [523.25, 659.25, 783.99, 1046.5, 1318.5].forEach((f, i) => tone(f, 0.08 + i * 0.1, 0.55, 'triangle', 0.15));
  }

  function pad(n) { return String(n).padStart(2, '0'); }

  function tick() {
    const now = new Date();
    const diff = LAUNCH_DATE - now;

    if (diff <= 0 && !launched) {
      launched = true;
      runLaunchSequence();
      return;
    }
    if (diff <= 0) return;

    const days = Math.floor(diff / 86400000);
    const hours = Math.floor((diff % 86400000) / 3600000);
    const mins = Math.floor((diff % 3600000) / 60000);
    const secs = Math.floor((diff % 60000) / 1000);

    document.getElementById('num-days').textContent = pad(days);
    document.getElementById('num-hours').textContent = pad(hours);
    document.getElementById('num-mins').textContent = pad(mins);
    const secEl = document.getElementById('num-secs');
    if (secEl.textContent !== pad(secs)) playTick();
    secEl.textContent = pad(secs);

    const isFinalHour = diff <= 3600000;
    ['unit-days','unit-hours','unit-mins','unit-secs'].forEach(id => {
      document.getElementById(id).classList.toggle('urgent', isFinalHour);
    });
  }

  let sparkleParticles = [];
  let sparkleLoopRunning = false;
  let sparkleCanvas = null;
  let sparkleCtx = null;

  function setupSparkleCanvas() {
    sparkleCanvas = document.getElementById('burst-canvas');
    if (!sparkleCanvas) return;
    const dpr = window.devicePixelRatio || 1;
    sparkleCanvas.width = window.innerWidth * dpr;
    sparkleCanvas.height = window.innerHeight * dpr;
    sparkleCanvas.style.width = window.innerWidth + 'px';
    sparkleCanvas.style.height = window.innerHeight + 'px';
    sparkleCtx = sparkleCanvas.getContext('2d');
    sparkleCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function drawStar(ctx, size, color) {
    ctx.strokeStyle = color;
    ctx.lineWidth = Math.max(size / 6, 1);
    ctx.beginPath();
    ctx.moveTo(0, -size); ctx.lineTo(0, size);
    ctx.moveTo(-size, 0); ctx.lineTo(size, 0);
    ctx.moveTo(-size * 0.7, -size * 0.7); ctx.lineTo(size * 0.7, size * 0.7);
    ctx.moveTo(-size * 0.7, size * 0.7); ctx.lineTo(size * 0.7, -size * 0.7);
    ctx.stroke();
  }

  function addBurst(originXFrac, originYFrac, count, spreadSpeed) {
    if (!sparkleCanvas) setupSparkleCanvas();
    const colors = ['#007AFF', '#FFD60A', '#FFFFFF', '#34C9FF', '#FF2D55', '#5AC8FA'];
    const originX = window.innerWidth * originXFrac;
    const originY = window.innerHeight * originYFrac;
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = (spreadSpeed || 8) * (0.4 + Math.random() * 0.9);
      const shapeRoll = Math.random();
      sparkleParticles.push({
        x: originX,
        y: originY,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 3,
        size: 3 + Math.random() * 6,
        color: colors[Math.floor(Math.random() * colors.length)],
        life: 1,
        decay: 0.006 + Math.random() * 0.012,
        shape: shapeRoll > 0.66 ? 'star' : shapeRoll > 0.33 ? 'circle' : 'rect',
        rotation: Math.random() * Math.PI,
        rotSpeed: (Math.random() - 0.5) * 0.35,
      });
    }
    ensureSparkleLoop();
  }

  function ensureSparkleLoop() {
    if (sparkleLoopRunning) return;
    sparkleLoopRunning = true;
    function frame() {
      if (!sparkleCtx) { sparkleLoopRunning = false; return; }
      sparkleCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      let alive = 0;
      sparkleParticles.forEach((p) => {
        if (p.life <= 0) return;
        alive++;
        p.vy += 0.16;
        p.vx *= 0.986;
        p.x += p.vx;
        p.y += p.vy;
        p.rotation += p.rotSpeed;
        p.life -= p.decay;

        sparkleCtx.save();
        sparkleCtx.globalAlpha = Math.max(p.life, 0);
        sparkleCtx.translate(p.x, p.y);
        sparkleCtx.rotate(p.rotation);
        sparkleCtx.fillStyle = p.color;
        if (p.shape === 'circle') {
          sparkleCtx.beginPath();
          sparkleCtx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
          sparkleCtx.fill();
        } else if (p.shape === 'star') {
          drawStar(sparkleCtx, p.size, p.color);
        } else {
          sparkleCtx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
        }
        sparkleCtx.restore();
      });

      sparkleParticles = sparkleParticles.filter((p) => p.life > 0);

      if (sparkleParticles.length > 0) {
        requestAnimationFrame(frame);
      } else {
        sparkleCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
        sparkleLoopRunning = false;
      }
    }
    requestAnimationFrame(frame);
  }

  function fireCelebration() {
    setupSparkleCanvas();
    // A flash + shockwave punctuate the exact zero moment, then three
    // staggered bursts from different spots give it a fuller fireworks feel.
    const flash = document.getElementById('flash-overlay');
    const wave = document.getElementById('shockwave');
    if (flash) {
      flash.style.transition = 'opacity 0.15s ease';
      flash.style.opacity = '1';
      setTimeout(() => { flash.style.transition = 'opacity 0.6s ease'; flash.style.opacity = '0'; }, 150);
    }
    if (wave) {
      wave.style.opacity = '0.9';
      wave.style.transition = 'none';
      wave.style.transform = 'translate(-50%, -50%) scale(1)';
      requestAnimationFrame(() => {
        wave.style.transition = 'transform 1s cubic-bezier(.1,.8,.3,1), opacity 1s ease';
        wave.style.transform = 'translate(-50%, -50%) scale(60)';
        wave.style.opacity = '0';
      });
    }

    addBurst(0.5, 0.5, 150, 11);
    setTimeout(() => addBurst(0.22, 0.45, 90, 9), 180);
    setTimeout(() => addBurst(0.78, 0.45, 90, 9), 320);
    setTimeout(() => addBurst(0.5, 0.35, 70, 7), 550);
  }

  function runLaunchSequence() {
    document.getElementById('pre-launch').style.display = 'none';
    document.getElementById('post-launch').style.display = 'block';
    document.getElementById('tagline').style.opacity = '0';
    const eyebrow = document.getElementById('eyebrow');
    if (eyebrow) eyebrow.classList.add('fading');

    playLaunchChime();
    fireCelebration();

    const headline = document.getElementById('launch-headline');
    const sub = document.getElementById('launch-sub');
    const btn = document.getElementById('download-btn');
    const note = document.querySelector('.download-note');

    animateIn(headline, 0);
    animateIn(sub, 200);
    animateIn(btn, 450, true);
    animateIn(note, 650);
  }

  function animateIn(el, delayMs, isButton) {
    if (!el) return;
    setTimeout(() => {
      if (isButton) el.style.display = 'inline-flex';
      el.style.transition = 'opacity 0.6s ease, transform 0.6s cubic-bezier(.2,.9,.3,1.3)';
      el.style.opacity = '1';
      el.style.transform = 'translateY(0) scale(1)';
    }, delayMs);
  }

  tick();
  setInterval(tick, 1000);
</script>

<footer class="site-footer">
  Made by <a href="https://rezkills.github.io/rezkills-studio/">Rezkills Studio</a>
</footer>

</body>
</html>
